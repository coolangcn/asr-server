                                <div class="bg-black/20 p-5 rounded-2xl border border-white/5 shadow-inner relative overflow-hidden">
                                     <!-- Decorative background icon -->
                                    <i class="fa-solid ${meta.icon} absolute -right-2 -bottom-2 text-6xl text-white/5 pointer-events-none transform rotate-12"></i>
                                    
                                    <div class="relative z-10 text-gray-200 text-[15px] leading-relaxed" style="white-space: pre-wrap;">
                                        ${isAnalyzing ? 
                                            `<div class="flex flex-col items-center py-4 bg-blue-500/5 rounded-xl border border-blue-500/10">
                                                <i class="fa-solid fa-spinner fa-spin text-blue-400 text-2xl mb-4"></i>
                                                <p class="text-blue-300 font-medium font-mono text-sm animate-pulse">Gemini Pro 2.5 正在深度对等识别中...</p>
                                                <p class="text-[10px] text-gray-500 mt-2">（观察期通常为发现哭声后的 5 分钟内）</p>
                                            </div>` : 
                                            (item.analysis_text || item.reason || '暂无详细分析内容').replace(/\\n/g, '<br>')
                                        }
                                    </div>
                                </div>
                                
                                <!-- Advice -->
                                ${!isAnalyzing ? `
                                <div class="bg-emerald-500/5 p-4 rounded-2xl text-emerald-300/90 text-sm border border-emerald-500/10 flex items-start gap-3 shadow-lg">
                                    <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center flex-shrink-0 text-amber-300 shadow-inner">
                                        <i class="fa-solid fa-wand-magic-sparkles animate-pulse"></i>
                                    </div>
                                    <div class="flex-1 py-1">
                                        <div class="text-[10px] uppercase tracking-wider text-emerald-500 font-black mb-1">妈咪安抚建议 / Suggestion</div>
                                        <div class="leading-relaxed font-medium text-gray-300">${item.advice || '请持续关注宝宝情绪状态，建议观察是否有生理需求。'}</div>
                                    </div>
                                </div>
                                ` : ''}

                                <!-- Actions -->
                                <div class="flex items-center gap-3 pt-2">
                                    ${item.audio_path || item.filename ?
                                    `<button onclick="playAudio('${item.audio_path || '/api/audio/' + item.filename}')" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl bg-${color}-500/10 hover:bg-${color}-500/20 border border-${color}-500/20 transition-all text-${color}-400 font-bold text-xs group/btn active:scale-95 shadow-lg">
                                        <div class="w-6 h-6 rounded-full bg-${color}-500/20 flex items-center justify-center group-hover/btn:scale-110 transition-transform">
                                            <i class="fa-solid fa-play text-[10px]"></i>
                                        </div>
                                        播放现场原声
                                    </button>` : ''}
                                    
                                    <button onclick="jumpToChat('${fileTime}')" class="bg-gray-800/80 hover:bg-white/10 px-4 py-3 rounded-2xl border border-white/5 text-gray-400 hover:text-white transition-all active:scale-95" title="定位到时光轴">
                                        <i class="fa-solid fa-clock-rotate-left"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                });
            });

            container.innerHTML = html;
        }

        async function fetchBabyCryEvents(silent = false) {
            try {
                const response = await fetch('/api/cry_events');
                const data = await response.json();
                renderBabyCry(data.events || []);
                // 自动滚动到顶部
                const container = document.getElementById('babycry-content');
                if (container) container.scrollTop = 0;
                
                setTimeout(initBabyCryTimeline, 100);
            } catch (e) {
                console.error("Failed to fetch baby cry events", e);
                document.getElementById('babycry-content').innerHTML = '<div class="text-center text-red-500 mt-20">数据加载失败</div>';
            }
        }

        function initBabyCryTimeline() {
            const contentEl = document.getElementById('babycry-content');
            const timelineEl = document.getElementById('babycry-timeline');
            const timelineContainer = document.getElementById('babycry-timeline-container');
            const markersEl = document.getElementById('babycry-timeline-markers');
            const indicatorEl = document.getElementById('babycry-timeline-indicator');
            const hoverTooltip = document.getElementById('babycry-timeline-hover-tooltip');

            if (!contentEl || !timelineContainer || !markersEl) return;
            const items = Array.from(contentEl.querySelectorAll('[data-bc-time]'));
            if (items.length === 0) return;

            generateTimelineMarkers(items, markersEl, 'data-bc-year-month');

            function getDateAtPosition(mouseY) {
                const rect = timelineContainer.getBoundingClientRect();
                const relativeY = mouseY - rect.top;
                const percentage = Math.max(0, Math.min(1, relativeY / rect.height));
                const itemIndex = Math.round(percentage * (items.length - 1));
                const item = items[itemIndex];
                if (item) {
                    const yearMonth = item.getAttribute('data-bc-year-month');
                    return { yearMonth: yearMonth.replace('-', '/'), item };
                }
                return null;
            }

            timelineContainer.addEventListener('mousemove', (e) => {
                const result = getDateAtPosition(e.clientY);
                if (result) {
                    hoverTooltip.textContent = result.yearMonth;
                    hoverTooltip.style.left = (e.clientX - 70) + 'px';
                    hoverTooltip.style.top = e.clientY + 'px';
                    hoverTooltip.style.opacity = '1';
                }
            });
            timelineContainer.addEventListener('mouseleave', () => hoverTooltip.style.opacity = '0');
            timelineContainer.addEventListener('click', (e) => {
                const result = getDateAtPosition(e.clientY);
                if (result && result.item) result.item.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });

            function updateIndicator() {
                const contentRect = contentEl.getBoundingClientRect();
                let closestIndex = 0; let closestDistance = Infinity;
                items.forEach((item, index) => {
                    const diff = Math.abs(item.getBoundingClientRect().top - contentRect.top);
                    if (diff < closestDistance) { closestDistance = diff; closestIndex = index; }
                });
                indicatorEl.style.top = `${(closestIndex / Math.max(items.length - 1, 1)) * 100}%`;
            }

            let scrollTimeout;
            contentEl.addEventListener('scroll', () => {
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(updateIndicator, 10);
                if (contentEl.scrollHeight > contentEl.clientHeight) {
                    const scrollPercentage = contentEl.scrollTop / (contentEl.scrollHeight - contentEl.clientHeight);
                    timelineEl.scrollTop = scrollPercentage * Math.max(0, timelineEl.scrollHeight - timelineEl.clientHeight);
                }
            });
            updateIndicator();
        }
    </script>
</body>
