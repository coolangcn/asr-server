<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👶 宝宝哭闹分析仪表盘</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --accent: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        /* Glassmorphism Header */
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fff 30%, var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-dim);
            font-weight: 400;
        }

        /* Action Bar */
        .action-bar {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 1.2rem 2rem;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #4338ca);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: inherit;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -5px var(--primary);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }



        .event-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .event-card:hover {
            transform: scale(1.03) translateY(-5px);
            border-color: var(--primary-light);
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .category-badge {
            padding: 0.35rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary-light);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .category-badge.pain { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border-color: rgba(239, 68, 68, 0.3); }
        .category-badge.hungry { background: rgba(245, 158, 11, 0.2); color: #fcd34d; border-color: rgba(245, 158, 11, 0.3); }

        .time-info {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        .card-body {
            display: grid;
            grid-template-columns: 1fr 120px;
            gap: 1rem;
            align-items: start;
        }

        .card-body h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }

        .reason-content {
            flex: 1;
        }

        .cry-illustration {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(16, 185, 129, 0.1));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border: 2px solid rgba(99, 102, 241, 0.2);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .cry-illustration::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            animation: pulse 3s infinite;
        }

        .cry-illustration img {
            border-radius: 12px;
            position: relative;
            z-index: 10;
        }

        .cry-illustration img.loading {
            opacity: 0.5;
            animation: loading-pulse 1.5s infinite;
        }

        @keyframes loading-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .advice-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            border-left: 3px solid var(--primary);
            margin-bottom: 1rem;
            grid-column: 1 / -1;
        }

        .advice-box ol {
            padding-left: 1.2rem;
            margin: 0;
        }

        .advice-box li {
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .duration-tag {
            background: #1e293b;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            color: var(--text-main);
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Main Content Layout - Side by Side (Full Height) */
        .main-content-wrapper {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 1.5rem;
            margin-top: 2rem;
            height: calc(100vh - 220px);
            align-items: stretch;
        }

        /* Log Container - Vertical Layout */
        #logContainer {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: zoomIn 0.6s ease-out;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        #logContainer:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 60px rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.5);
            z-index: 10;
        }

        #logContainer::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .terminal-header {
            background: #0f172a;
            padding: 0.5rem 1rem;
            display: flex;
            gap: 0.4rem;
            border-bottom: 1px solid #334155;
            flex-shrink: 0;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        #processLogs {
            background: #020617;
            color: #10b981;
            padding: 1.5rem;
            font-family: 'Fira Code', 'Courier New', monospace;
            flex: 1;
            overflow-y: auto;
            font-size: 0.85rem;
            white-space: pre-wrap;
            line-height: 1.6;
            scrollbar-width: thin;
            scrollbar-color: #334155 #020617;
        }

        #processLogs::-webkit-scrollbar { width: 6px; }
        #processLogs::-webkit-scrollbar-track { background: #020617; }
        #processLogs::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* Grid View */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.5rem;
            animation: fadeInUp 1s ease-out;
            height: 100%;
            overflow-y: auto;
            padding-right: 8px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 12px;
            border: 1px solid transparent;
        }

        .grid-container:hover {
            transform: scale(1.01);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 50px rgba(99, 102, 241, 0.15);
            z-index: 10;
        }

        .grid-container::-webkit-scrollbar { width: 8px; }
        .grid-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        .grid-container::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.5); border-radius: 10px; }
        .grid-container::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.7); }

        /* Responsive */
        @media (max-width: 1200px) {
            .main-content-wrapper {
                grid-template-columns: 1fr;
                height: auto;
            }
            #logContainer {
                position: relative;
                height: 400px;
                min-height: auto;
            }
            .grid-container {
                max-height: none;
                overflow: visible;
                padding-right: 0;
            }
        }

        @media (max-width: 768px) {
            .action-bar { flex-direction: column; gap: 1rem; align-items: stretch; }
            .grid-container { grid-template-columns: 1fr; }
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👶 宝宝情感与哭闹分析</h1>
            <p class="subtitle">深度多模态行为追踪系统</p>
        </header>

        <div class="action-bar">
            <div class="status-badge">
                <div class="status-dot"></div>
                <span id="triggerStatus">系统就绪，实时监控中</span>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <label style="font-size: 0.85rem; color: var(--text-dim); cursor: pointer; display: flex; align-items: center; gap: 0.3rem;">
                    <input type="checkbox" id="replaceCheck" style="accent-color: var(--primary);"> 覆盖分析结果
                </label>
                <button id="reprocessBtn" class="btn-primary" onclick="triggerReprocess()">
                    <span>🚀</span> 启动历史回顾分析
                </button>
            </div>
        </div>
        
        <div class="main-content-wrapper">
            <!-- 左侧：日志面板 (420px) -->
            <div id="logContainer">
                <div class="terminal-header">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                </div>
                <div id="processLogs">等待分析任务启动...</div>
            </div>
            
            <!-- 右侧：结果网格 (自适应) -->
            <div class="grid-container" id="cryData">
                <!-- Data populated by JS -->
                <div class="status" style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-dim);">
                    🛸 正在对接神经网络数据...
                </div>
            </div>
        </div>
    </div>

    <script>
        let eventsInterval = null;
        
        window.addEventListener('DOMContentLoaded', async () => {
            await loadCryEvents();
            // 每30秒自动刷新事件列表（低频）
            eventsInterval = setInterval(loadCryEvents, 30000);
        });
        
        // 页面不可见时暂停轮询，恢复时重启
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 页面隐藏时暂停轮询
                if (eventsInterval) {
                    clearInterval(eventsInterval);
                    eventsInterval = null;
                }
                if (logInterval) {
                    clearInterval(logInterval);
                }
                console.log('[BabyCry] 页面隐藏，暂停轮询');
            } else {
                // 页面显示时恢复轮询
                if (!eventsInterval) {
                    eventsInterval = setInterval(loadCryEvents, 30000);
                }
                if (!logInterval && document.getElementById('logContainer').style.display === 'block') {
                    logInterval = setInterval(fetchLogs, 2000);
                }
                console.log('[BabyCry] 页面显示，恢复轮询');
            }
        });

        async function loadCryEvents() {
            const container = document.getElementById('cryData');
            try {
                const response = await fetch('/api/cry_events?limit=50');
                const result = await response.json();
                
                if (response.ok) {
                    const events = result.events;
                    if (events.length === 0) {
                        container.innerHTML = '<div class="status" style="grid-column: 1/-1;">📭 观测范围内未见异常行为</div>';
                        return;
                    }
                    
                    let html = '';
                    events.forEach((ev, index) => {
                        const recTime = new Date(ev.recording_time || ev.created_at);
                        const dateStr = recTime.toLocaleDateString();
                        const timeStr = recTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        
                        const start = ev.start_time.toFixed(1);
                        const end = ev.end_time.toFixed(1);
                        const duration = (ev.end_time - ev.start_time).toFixed(1);
                        
                        const reason = ev.reason || '未知诱因';
                        const category = (ev.reason_category || 'pending').toLowerCase();
                        const advice = ev.advice || '建议保持严密观察并在必要时提供安抚。';
                        const illustrationUrl = ev.illustration_url || null;
                        
                        // Map category to icon
                        let icon = '🍼';
                        let illustrationIcon = '👶';
                        if (category.includes('饿') || category.includes('hungry')) { icon = '🍼'; illustrationIcon = '🍼'; }
                        if (category.includes('痛') || category.includes('pain')) { icon = '❤️‍🩹'; illustrationIcon = '😢'; }
                        if (category.includes('困') || category.includes('sleepy')) { icon = '😴'; illustrationIcon = '💤'; }
                        if (category.includes('情绪') || category.includes('emotion')) { icon = '🧸'; illustrationIcon = '🤗'; }

                        // 处理安抚建议的换行（支持 1. 2. 3. 格式）
                        let formattedAdvice = advice;
                        if (advice.includes('1.') || advice.includes('1、')) {
                            const adviceLines = advice.split(/(?=\d+[.,])/g);
                            formattedAdvice = '<ol>' + adviceLines.map(line => `<li>${line.replace(/^\d+[.,]\s*/, '')}</li>`).join('') + '</ol>';
                        }

                        html += `
                            <div class="event-card" style="animation-delay: ${index * 0.1}s">
                                <div class="card-header">
                                    <div class="category-badge ${category}">${icon} ${ev.reason_category || '行为分析'}</div>
                                    <div class="time-info">
                                        <div style="font-size: 0.9rem; color: #fff;">${timeStr}</div>
                                        <div>${dateStr}</div>
                                    </div>
                                </div>
                                <div class="card-body">
                                    <div class="reason-content">
                                        <h3>${reason}</h3>
                                        <div class="advice-box">${formattedAdvice}</div>
                                    </div>
                                    <div class="cry-illustration" title="${ev.reason_category || '未知'}">
                                        ${illustrationUrl ? `<img src="${illustrationUrl}" alt="${ev.reason_category}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">` : illustrationIcon}
                                    </div>
                                </div>
                                <div class="card-footer">
                                    <div class="duration-tag">⏱️ 时段：${start} - ${end}s</div>
                                    <div>文件：${ev.filename.slice(-15)}</div>
                                </div>
                            </div>
                        `;
                    });
                    
                    container.innerHTML = html;
                } else {
                    container.innerHTML = `<div class="status" style="grid-column: 1/-1; color: var(--danger);">🛑 系统同步异常: ${result.error}</div>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="status" style="grid-column: 1/-1; color: var(--danger);">📡 空间链路中断，无法获取遥测数据</div>`;
            }
        }

        let logInterval = null;
        let lastLogContent = '';  // 用于检测日志是否有变化
        let noChangeCount = 0;    // 连续无变化计数

        async function fetchLogs() {
            try {
                const response = await fetch('/api/live_status');
                const result = await response.json();
                if (result.logs_a) {
                    const logEl = document.getElementById('processLogs');
                    const isScrolledToBottom = logEl.scrollHeight - logEl.clientHeight <= logEl.scrollTop + 50;
                    
                    // 检测日志内容是否有变化
                    if (result.logs_a === lastLogContent) {
                        noChangeCount++;
                        // 如果连续5次没有变化，降低轮询频率到10秒
                        if (noChangeCount >= 5 && logInterval) {
                            clearInterval(logInterval);
                            logInterval = setInterval(fetchLogs, 10000);
                            console.log('[BabyCry] 日志无更新，降低轮询频率至10秒');
                        }
                    } else {
                        noChangeCount = 0;
                        // 如果有变化且当前是低频模式，恢复高频
                        if (logInterval) {
                            clearInterval(logInterval);
                            logInterval = setInterval(fetchLogs, 3000);
                        }
                    }
                    lastLogContent = result.logs_a;
                    
                    logEl.textContent = result.logs_a;
                    if (isScrolledToBottom) {
                        logEl.scrollTop = logEl.scrollHeight;
                    }
                }
            } catch (e) {
                console.error("Fetch log error:", e);
            }
        }

        function stopLogPolling() {
            if (logInterval) {
                clearInterval(logInterval);
                logInterval = null;
                console.log('[BabyCry] 日志轮询已停止');
            }
        }

        async function triggerReprocess() {
            const btn = document.getElementById('reprocessBtn');
            const statusLabel = document.getElementById('triggerStatus');
            const isReplace = document.getElementById('replaceCheck')?.checked || false;
            
            btn.disabled = true;
            statusLabel.textContent = "⏳ 已向核心处理单元发送指令...";
            
            document.getElementById('logContainer').style.display = 'block';
            if (!logInterval) {
                noChangeCount = 0;
                lastLogContent = '';
                logInterval = setInterval(fetchLogs, 3000);  // 初始3秒轮询
            }
            
            try {
                const url = `/api/trigger_reprocess?replace=${isReplace}`;
                const response = await fetch(url, { method: 'POST' });
                const result = await response.json();
                
                if (response.ok) {
                    statusLabel.style.color = 'var(--accent)';
                    statusLabel.textContent = "🟢 分析阵列已上线: " + result.message;
                    // 5分钟后自动停止日志轮询
                    setTimeout(stopLogPolling, 5 * 60 * 1000);
                } else {
                    statusLabel.style.color = 'var(--danger)';
                    statusLabel.textContent = "🔴 阵列启动失败: " + result.error;
                    btn.disabled = false;
                    stopLogPolling();
                }
            } catch (e) {
                statusLabel.style.color = 'var(--danger)';
                statusLabel.textContent = "🔴 神经网络链路连接超时";
                btn.disabled = false;
                stopLogPolling();
            }
        }
    </script>
</body>
</html>
