<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝哭闹分析</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f4f7f9; color: #333; margin: 0; }
        .container { background: #fff; padding: 2rem 3rem; border-radius: 12px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1); width: 100%; max-width: 1100px; margin: 2rem auto; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 1.5rem; }
        .nav { display: flex; justify-content: center; margin-bottom: 2rem; }
        .nav a { padding: 0.8rem 1.5rem; margin: 0 0.5rem; text-decoration: none; background: #007bff; color: white; border-radius: 6px; }
        .nav a:hover { background: #0056b3; }
        .nav a.active { background: #0056b3; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; font-weight: 600; color: #495057; }
        tr:hover { background-color: #f1f3f5; }
        .reason-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: 600; background-color: #e9ecef; }
        .time-col { color: #6c757d; font-size: 0.9rem; }
        .duration-col { font-weight: bold; color: #495057; }
        .advice-col { max-width: 300px; line-height: 1.4; color: #495057; font-size: 0.95rem; }
        .status { text-align: center; padding: 1rem; color: #666; }
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .btn-action { padding: 0.6rem 1.2rem; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; transition: background 0.3s; }
        .btn-action:hover { background: #218838; }
        .btn-action:disabled { background: #6c757d; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        
        <h1>宝宝哭闹历史记录</h1>

        <div class="action-bar">
            <div>
                <span id="triggerStatus" style="color: #007bff; font-weight: 500;"></span>
            </div>
            <button id="reprocessBtn" class="btn-action" onclick="triggerReprocess()">🚀 一键分析历史音频</button>
        </div>
        
        <div id="logContainer" style="display: none; margin-bottom: 20px;">
            <div style="background: #1e1e1e; color: #a9dc76; padding: 15px; border-radius: 8px; font-family: monospace; height: 250px; overflow-y: auto; font-size: 13px; white-space: pre-wrap; line-height: 1.5;" id="processLogs">准备读取日志...</div>
        </div>
        
        <div class="table-responsive">
            <table id="cryTable">
                <thead>
                    <tr>
                        <th>录音时间</th>
                        <th>发生时段 (s)</th>
                        <th>主分析原因</th>
                        <th>安抚建议 / 详情</th>
                        <th>来源文件</th>
                    </tr>
                </thead>
                <tbody id="cryData">
                    <tr><td colspan="5" class="status">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            await loadCryEvents();
        });

        async function loadCryEvents() {
            const tbody = document.getElementById('cryData');
            try {
                const response = await fetch('/api/cry_events?limit=50');
                const result = await response.json();
                
                if (response.ok) {
                    const events = result.events;
                    if (events.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="status">暂无哭闹记录</td></tr>';
                        return;
                    }
                    
                    let html = '';
                    events.forEach(ev => {
                        const recTime = new Date(ev.recording_time || ev.created_at).toLocaleString();
                        const duration = (ev.end_time - ev.start_time).toFixed(1);
                        const reason = ev.reason || '未识别';
                        const advice = ev.advice || '无';
                        const start = ev.start_time.toFixed(1);
                        const end = ev.end_time.toFixed(1);
                        
                        html += `
                            <tr>
                                <td class="time-col">${recTime}</td>
                                <td class="duration-col">${start} - ${end} (${duration}s)</td>
                                <td><span class="reason-badge">${reason}</span></td>
                                <td class="advice-col">${advice}</td>
                                <td class="time-col" style="word-break: break-all; font-size:0.8rem">${ev.filename}</td>
                            </tr>
                        `;
                    });
                    
                    tbody.innerHTML = html;
                } else {
                    tbody.innerHTML = `<tr><td colspan="5" class="status" style="color:red">加载失败: ${result.error}</td></tr>`;
                }
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="status" style="color:red">网络错误: window.location.host 无法访问</td></tr>`;
            }
        }

        let logInterval = null;

        async function fetchLogs() {
            try {
                const response = await fetch('/api/reprocess_logs');
                const result = await response.json();
                if (result.logs) {
                    const logEl = document.getElementById('processLogs');
                    // 只需简单地赋值
                    const isScrolledToBottom = logEl.scrollHeight - logEl.clientHeight <= logEl.scrollTop + 10;
                    logEl.textContent = result.logs;
                    if (isScrolledToBottom) {
                        logEl.scrollTop = logEl.scrollHeight;
                    }
                }
            } catch (e) {
                console.error("Fetch log error:", e);
            }
        }

        async function triggerReprocess() {
            const btn = document.getElementById('reprocessBtn');
            const statusLabel = document.getElementById('triggerStatus');
            btn.disabled = true;
            statusLabel.textContent = "⏳ 正在拉起独立后台分析任务...";
            
            document.getElementById('logContainer').style.display = 'block';
            if (!logInterval) {
                logInterval = setInterval(fetchLogs, 1500);
            }
            
            try {
                const response = await fetch('/api/trigger_reprocess', { method: 'POST' });
                const result = await response.json();
                
                if (response.ok) {
                    statusLabel.style.color = '#28a745';
                    statusLabel.textContent = "✅ " + result.message;
                } else {
                    statusLabel.style.color = '#dc3545';
                    statusLabel.textContent = "❌ 触发失败: " + result.error;
                    btn.disabled = false;
                }
            } catch (e) {
                statusLabel.style.color = '#dc3545';
                statusLabel.textContent = "❌ 网络连接失败";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
